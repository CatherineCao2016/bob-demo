---
# inventory/hosts.yml — Ansible inventory for the OpenShift cluster
#
# The kubernetes.core collection connects locally using the k8s_host and
# k8s_api_key variables below. No SSH connection is needed — all tasks
# run kubectl/oc API calls from the control machine.
#
# Usage:
#   export OC_TOKEN=$(oc whoami -t)
#   ansible-playbook -i inventory/hosts.yml playbook.yml
#
# Or pass the token inline:
#   ansible-playbook -i inventory/hosts.yml playbook.yml \
#     -e k8s_api_key="$(oc whoami -t)"

all:
  hosts:
    openshift_cluster:
      ansible_connection: local   # kubectl/oc commands run locally against the cluster API
      ansible_python_interpreter: /Users/catherinecao/Documents/2026/Bob_for_FSM/temp-demo/.venv/bin/python3

  vars:
    # OpenShift cluster API endpoint.
    # Set via environment variable to avoid hardcoding in source control:
    #   export K8S_AUTH_HOST=https://api.your-cluster.example.com:6443
    # Or override with -e k8s_host="https://..."
    k8s_host: "{{ lookup('env', 'TF_VAR_cluster_url') | default('https://api.your-openshift-cluster.example.com:6443', true) }}"

    # Service account bearer token.
    # Reads from the same env var used by Terraform so you only need to
    # export it once:
    #   export TF_VAR_cluster_token=$(oc whoami -t)
    k8s_api_key: "{{ lookup('env', 'TF_VAR_cluster_token') | default('', true) }}"

    # Disable TLS verification for self-signed dev cluster certs.
    # Set to false in production.
    k8s_verify_ssl: false

  children:
    staging:
      hosts:
        openshift_cluster:
      vars:
        target_namespace: bob-demo-staging
        db_password: "{{ lookup('env', 'STAGING_DB_PASSWORD') | default('STAGING_DB_PASSWORD_PLACEHOLDER', true) }}"

    production:
      hosts:
        openshift_cluster:
      vars:
        target_namespace: bob-demo-prod
        db_password: "{{ lookup('env', 'PROD_DB_PASSWORD') | default('PROD_DB_PASSWORD_PLACEHOLDER', true) }}"

# Made with Bob
