# =============================================================================
# GitHub Actions CI/CD — payment-app (Java 17)
#
# Single cluster · two namespaces: bob-demo-staging | bob-demo-prod
#
# Required GitHub Secrets:
#   OPENSHIFT_SERVER    — API URL of the OpenShift cluster
#   OPENSHIFT_TOKEN     — Service-account token (used for both namespaces)
#   OPENSHIFT_REGISTRY  — Internal registry hostname
#                         e.g. image-registry.openshift-image-registry.svc:5000
# =============================================================================

name: CI/CD — payment-app

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref to save runner minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Shared env ────────────────────────────────────────────────────────────────
env:
  JAVA_VERSION: "17"
  WORKING_DIR: payment-app-java17
  STAGING_NS: bob-demo-staging
  PROD_NS: bob-demo-prod
  APP_NAME: payment-app

# =============================================================================
# ██████████████████████████  CI  ████████████████████████████████████████████
# =============================================================================
jobs:

  # ── 1. Build ────────────────────────────────────────────────────────────────
  build:
    name: "CI · Build (Maven / Java 17)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    outputs:
      skip_checks: ${{ steps.check_skip.outputs.skip_checks }}
      image_tag:   ${{ steps.set_tag.outputs.image_tag }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Detect [skip checks] in the triggering commit message
      - name: Detect [skip checks] flag
        id: check_skip
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qF '[skip checks]'; then
            echo "skip_checks=true"  >> "$GITHUB_OUTPUT"
            echo "⚠️  [skip checks] detected — quality gates will be skipped."
          else
            echo "skip_checks=false" >> "$GITHUB_OUTPUT"
          fi

      # Derive image tag from the git SHA (short form for readability)
      - name: Set image tag
        id: set_tag
        run: echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build with Maven (skip tests — tests run in next job)
        run: mvn --batch-mode package -DskipTests -q

      # Cache the compiled JAR so downstream jobs don't rebuild
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: payment-app-jar
          path: ${{ env.WORKING_DIR }}/target/payment-app-*.jar
          retention-days: 1

  # ── 2. JUnit Tests ──────────────────────────────────────────────────────────
  test:
    name: "CI · JUnit Tests"
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.skip_checks != 'true'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run JUnit tests
        run: mvn --batch-mode test

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: ${{ env.WORKING_DIR }}/target/surefire-reports/
          retention-days: 7

  # ── 3. OWASP Dependency-Check ───────────────────────────────────────────────
  owasp:
    name: "CI · OWASP Dependency-Check (CVSS ≥ 7 = fail)"
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.skip_checks != 'true'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # Cache the NVD data between runs to speed up subsequent scans
      - name: Cache OWASP NVD data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: owasp-nvd-${{ runner.os }}-

      - name: Run OWASP dependency-check (fail on CVSS >= 7)
        run: |
          mvn --batch-mode \
            org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=HTML \
            -DoutputDirectory=target/dependency-check-report

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: ${{ env.WORKING_DIR }}/target/dependency-check-report/
          retention-days: 14

  # ── 4. Semgrep SAST ─────────────────────────────────────────────────────────
  semgrep:
    name: "CI · Semgrep SAST"
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.skip_checks != 'true'
    container:
      image: semgrep/semgrep:latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run Semgrep SAST scan
        run: |
          semgrep \
            --config "p/java" \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --error \
            --json \
            --output semgrep-results.json \
            ${{ env.WORKING_DIR }}/src
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 14

  # ── 5-7. Build & Push Docker Image ──────────────────────────────────────────
  docker-build-push:
    name: "CI · Docker Build & Push → bob-demo-staging"
    runs-on: ubuntu-latest
    # Only push on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, test, owasp, semgrep]
    # Allow this job to run even when quality-gate jobs were skipped
    # (skip_checks=true path): test/owasp/semgrep are skipped, not failed.

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Install OpenShift CLI ──────────────────────────────────────────────
      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      # ── Login to OpenShift & registry ─────────────────────────────────────
      - name: Log in to OpenShift cluster
        run: |
          oc login \
            --server="${{ secrets.OPENSHIFT_SERVER }}" \
            --token="${{ secrets.OPENSHIFT_TOKEN }}" \
            --insecure-skip-tls-verify=false

      - name: Log in to OpenShift internal registry
        run: oc registry login

      # ── Build Docker image ─────────────────────────────────────────────────
      - name: Build Docker image
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          docker build \
            --tag "${{ secrets.OPENSHIFT_REGISTRY }}/${{ env.STAGING_NS }}/${{ env.APP_NAME }}:${{ github.sha }}" \
            .

      # ── Push to staging namespace ──────────────────────────────────────────
      - name: Push image to bob-demo-staging
        run: |
          docker push \
            "${{ secrets.OPENSHIFT_REGISTRY }}/${{ env.STAGING_NS }}/${{ env.APP_NAME }}:${{ github.sha }}"

# =============================================================================
# ████████████████████████  CD — STAGING  ████████████████████████████████████
# =============================================================================

  deploy-staging:
    name: "CD · Deploy → bob-demo-staging"
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment:
      name: staging
      url: https://payment-app-bob-demo-staging.apps.${{ secrets.CLUSTER_DOMAIN }}

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Log in to OpenShift cluster
        run: |
          oc login \
            --server="${{ secrets.OPENSHIFT_SERVER }}" \
            --token="${{ secrets.OPENSHIFT_TOKEN }}" \
            --insecure-skip-tls-verify=false

      # ── Substitute placeholders and apply manifests ────────────────────────
      - name: Deploy to bob-demo-staging
        run: |
          sed \
            -e "s|\${IMAGE_REGISTRY}|${{ secrets.OPENSHIFT_REGISTRY }}|g" \
            -e "s|\${NAMESPACE}|${{ env.STAGING_NS }}|g" \
            -e "s|\${IMAGE_TAG}|${{ env.IMAGE_TAG }}|g" \
            payment-app-java17/k8s/deployment.yaml \
          | oc apply -n "${{ env.STAGING_NS }}" -f -

      - name: Wait for rollout to complete
        run: |
          oc rollout status deployment/${{ env.APP_NAME }} \
            -n "${{ env.STAGING_NS }}" \
            --timeout=5m

      # ── Smoke tests against staging ────────────────────────────────────────
      - name: Run smoke tests against staging
        run: |
          STAGING_URL="https://payment-app-${{ env.STAGING_NS }}.apps.${{ secrets.CLUSTER_DOMAIN }}"

          echo "▶ Health check — /actuator/health"
          HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
            "${STAGING_URL}/actuator/health")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP ${HTTP_STATUS})"
            exit 1
          fi
          echo "✅ Health check passed (HTTP ${HTTP_STATUS})"

          echo "▶ Smoke test — POST /api/payments/authorize"
          RESP=$(curl -sk -o /dev/null -w "%{http_code}" \
            -X POST "${STAGING_URL}/api/payments/authorize" \
            -H "Content-Type: application/json" \
            -d '{"cardNumber":"4111111111111111","amount":1.00,"currency":"USD","merchantId":"smoke-test"}')
          if [ "$RESP" != "200" ] && [ "$RESP" != "201" ]; then
            echo "❌ Authorize smoke test failed (HTTP ${RESP})"
            exit 1
          fi
          echo "✅ Authorize smoke test passed (HTTP ${RESP})"

# =============================================================================
# ████████████████████████  CD — PRODUCTION  ██████████████████████████████████
# =============================================================================

  deploy-prod:
    name: "CD · Promote & Deploy → bob-demo-prod"
    runs-on: ubuntu-latest
    needs: deploy-staging
    # ── Manual approval gate ──────────────────────────────────────────────────
    # Configure a "production" environment in GitHub → Settings → Environments
    # and add required reviewers to enforce the approval step.
    environment:
      name: production
      url: https://payment-app-bob-demo-prod.apps.${{ secrets.CLUSTER_DOMAIN }}

    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Log in to OpenShift cluster
        run: |
          oc login \
            --server="${{ secrets.OPENSHIFT_SERVER }}" \
            --token="${{ secrets.OPENSHIFT_TOKEN }}" \
            --insecure-skip-tls-verify=false

      # ── Promote image: staging → prod (no rebuild) ─────────────────────────
      # oc tag copies the image stream tag within the same cluster registry.
      # The exact artifact validated in staging is promoted — never rebuilt.
      - name: Promote image from staging to production
        run: |
          oc tag \
            "${{ env.STAGING_NS }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}" \
            "${{ env.PROD_NS }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}"

      # ── Apply manifests to prod namespace ─────────────────────────────────
      - name: Deploy to bob-demo-prod (rolling update)
        run: |
          sed \
            -e "s|\${IMAGE_REGISTRY}|${{ secrets.OPENSHIFT_REGISTRY }}|g" \
            -e "s|\${NAMESPACE}|${{ env.PROD_NS }}|g" \
            -e "s|\${IMAGE_TAG}|${{ env.IMAGE_TAG }}|g" \
            payment-app-java17/k8s/deployment.yaml \
          | oc apply -n "${{ env.PROD_NS }}" -f -

      - name: Wait for production rollout to complete
        run: |
          oc rollout status deployment/${{ env.APP_NAME }} \
            -n "${{ env.PROD_NS }}" \
            --timeout=10m

      - name: Confirm production deployment
        run: |
          echo "✅ payment-app:${{ env.IMAGE_TAG }} is live in ${{ env.PROD_NS }}"
          oc get deployment/${{ env.APP_NAME }} \
            -n "${{ env.PROD_NS }}" \
            -o jsonpath='{.spec.template.spec.containers[0].image}'

